<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitTrack Pro 控制中心</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #334155;
            --border: #475569;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --green: #10b981;
            --red: #ef4444;
            --blue: #3b82f6;
            --orange: #f59e0b;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }
        .login-screen {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-primary);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 1000;
        }
        .login-box {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            width: 100%; max-width: 400px;
            text-align: center;
        }
        .login-title {
            font-size: 28px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--blue), #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .login-input {
            width: 100%; padding: 14px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 16px;
            margin: 16px 0;
        }
        .login-btn {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, var(--blue), #8b5cf6);
            color: white; border: none;
            border-radius: 8px;
            font-size: 16px; font-weight: 600;
            cursor: pointer;
        }
        .container { display: none; }
        .container.logged-in { display: block; }
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 24px;
            background: linear-gradient(135deg, var(--blue), #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .main-content { padding: 24px; max-width: 1200px; margin: 0 auto; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }
        .stat-label { font-size: 14px; color: var(--text-secondary); margin-bottom: 8px; }
        .stat-value { font-size: 32px; font-weight: 700; }
        .stat-value.green { color: var(--green); }
        .stat-value.blue { color: var(--blue); }
        .control-section {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .section-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; }
        .form-group {
            margin-bottom: 16px;
        }
        .form-label {
            display: block;
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        .form-input {
            width: 100%; padding: 12px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--blue);
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--blue), #8b5cf6);
            color: white;
        }
        .btn-success {
            background: var(--green);
            color: white;
        }
        .btn-danger {
            background: var(--red);
            color: white;
        }
        .btn-large {
            padding: 20px 40px;
            font-size: 18px;
            width: 100%;
        }
        .btn-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }
        .switch-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 30px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .switch-btn.fitness {
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            color: white;
        }
        .switch-btn.custom {
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            color: white;
        }
        .switch-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .device-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .device-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            background: var(--bg-card);
            border-radius: 8px;
        }
        .device-mode {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .device-mode.fitness {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
        }
        .device-mode.custom {
            background: rgba(139, 92, 246, 0.2);
            color: #8b5cf6;
        }
        .toast {
            position: fixed;
            top: 24px;
            right: 24px;
            padding: 16px 24px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: none;
            z-index: 1000;
        }
        .toast.show { display: block; }
    </style>
</head>
<body>
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <h1 class="login-title">⚡ FitTrack Pro</h1>
            <p style="color: var(--text-secondary); margin-bottom: 24px;">控制中心</p>
            <input type="password" class="login-input" id="passwordInput" placeholder="输入管理员密码">
            <button class="login-btn" onclick="login()">登录</button>
        </div>
    </div>
    
    <div class="container" id="mainContainer">
        <div class="header">
            <h1>⚡ FitTrack Pro 控制中心</h1>
            <div style="color: var(--text-secondary); font-size: 14px;">
                <span id="apiStatus">🟢 在线</span>
            </div>
        </div>
        
        <div class="main-content">
            <!-- 统计 -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">在线设备</div>
                    <div class="stat-value blue" id="onlineCount">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">A面用户</div>
                    <div class="stat-value green" id="fitnessCount">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">B面用户</div>
                    <div class="stat-value" style="color: var(--orange);" id="customCount">0</div>
                </div>
            </div>
            
            <!-- B面链接配置 -->
            <div class="control-section">
                <div class="section-title">🔗 B面链接配置</div>
                <div class="form-group">
                    <label class="form-label">自定义页面 URL</label>
                    <input type="text" class="form-input" id="customUrl" placeholder="https://example.com">
                    <p style="font-size: 12px; color: var(--text-secondary); margin-top: 8px;">
                        App的B面将加载此链接
                    </p>
                </div>
                <button class="btn btn-primary" onclick="saveCustomUrl()">保存配置</button>
            </div>
            
            <!-- 一键切换 -->
            <div class="control-section">
                <div class="section-title">
                    🔴 一键切换 A/B 面
                    <span style="font-size: 12px; color: var(--text-secondary);">(立即影响所有在线设备)</span>
                </div>
                <div class="btn-grid">
                    <button class="switch-btn fitness" onclick="forceAll('fitness')">
                        <span style="font-size: 32px;">🏃</span>
                        <span style="font-size: 18px; font-weight: 600;">切换到 A 面</span>
                        <span style="font-size: 12px; opacity: 0.8;">显示健身界面</span>
                    </button>
                    <button class="switch-btn custom" onclick="forceAll('custom')">
                        <span style="font-size: 32px;">🌐</span>
                        <span style="font-size: 18px; font-weight: 600;">切换到 B 面</span>
                        <span style="font-size: 12px; opacity: 0.8;">显示自定义页面</span>
                    </button>
                </div>
            </div>
            
            <!-- 设备列表 -->
            <div class="control-section">
                <div class="section-title">📱 在线设备</div>
                <div class="device-list" id="deviceList">
                    <div style="color: var(--text-secondary); text-align: center; padding: 40px;">暂无设备数据</div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="toast" id="toast">操作成功</div>
    
    <script>
        const DB_KEY = 'fittrack_db_v1';
        
        function getDB() {
            const data = localStorage.getItem(DB_KEY);
            return data ? JSON.parse(data) : {
                config: {
                    customUrl: '',
                    updatedAt: new Date().toISOString()
                },
                devices: {},
                stats: { onlineDevices: 0, fitnessUsers: 0, customUsers: 0 }
            };
        }
        
        function saveDB(db) {
            localStorage.setItem(DB_KEY, JSON.stringify(db));
        }
        
        function login() {
            const password = document.getElementById('passwordInput').value;
            if (password === 'admin123456' || password === 'admin') {
                localStorage.setItem('ft_admin_logged_in', 'true');
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainContainer').classList.add('logged-in');
                loadConfig();
                updateUI();
            } else {
                alert('密码错误');
            }
        }
        
        if (localStorage.getItem('ft_admin_logged_in') === 'true') {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainContainer').classList.add('logged-in');
            loadConfig();
        }
        
        function loadConfig() {
            const db = getDB();
            document.getElementById('customUrl').value = db.config.customUrl || '';
        }
        
        function saveCustomUrl() {
            const url = document.getElementById('customUrl').value.trim();
            const db = getDB();
            db.config.customUrl = url;
            db.config.updatedAt = new Date().toISOString();
            saveDB(db);
            showToast('链接已保存');
        }
        
        function updateUI() {
            const db = getDB();
            
            const devices = Object.values(db.devices);
            const onlineDevices = devices.filter(d => {
                const lastActive = new Date(d.lastActive);
                return (new Date() - lastActive) < 60000;
            });
            const fitnessUsers = devices.filter(d => d.screenMode === 'fitness');
            const customUsers = devices.filter(d => d.screenMode === 'custom');
            
            document.getElementById('onlineCount').textContent = onlineDevices.length;
            document.getElementById('fitnessCount').textContent = fitnessUsers.length;
            document.getElementById('customCount').textContent = customUsers.length;
            
            renderDevices(devices);
        }
        
        function renderDevices(devices) {
            const list = document.getElementById('deviceList');
            
            if (devices.length === 0) {
                list.innerHTML = '<div style="color: var(--text-secondary); text-align: center; padding: 40px;">暂无设备数据</div>';
                return;
            }
            
            list.innerHTML = devices.map(d => `
                <div class="device-item">
                    <div>
                        <div style="font-family: monospace; font-size: 12px; color: var(--text-secondary);">${d.id}</div>
                        <div style="font-size: 12px; color: var(--text-secondary);">${d.model || 'Unknown'} · 最后活跃: ${new Date(d.lastActive).toLocaleTimeString()}</div>
                    </div>
                    <span class="device-mode ${d.screenMode}">
                        ${d.screenMode === 'fitness' ? '🏃 A面' : '🌐 B面'}
                    </span>
                </div>
            `).join('');
        }
        
        function forceAll(mode) {
            const modeText = mode === 'fitness' ? 'A面' : 'B面';
            
            if (!confirm(`确定要强制所有设备切换到${modeText}吗？`)) {
                return;
            }
            
            const db = getDB();
            db.config.forcedMode = mode;
            db.config.forcedAt = new Date().toISOString();
            
            Object.keys(db.devices).forEach(id => {
                db.devices[id].screenMode = mode;
                db.devices[id].forcedSwitch = true;
            });
            
            saveDB(db);
            
            const affectedCount = Object.keys(db.devices).length;
            showToast(`已强制 ${affectedCount} 个设备切换到${modeText}`);
            updateUI();
        }
        
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        setInterval(updateUI, 5000);
        updateUI();
    </script>
</body>
</html>
