<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitTrack Pro 控制中心</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #334155;
            --border: #475569;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --green: #10b981;
            --red: #ef4444;
            --blue: #3b82f6;
            --purple: #8b5cf6;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }
        .login-screen {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-primary);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 1000;
        }
        .login-box {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            width: 100%; max-width: 400px;
            text-align: center;
        }
        .login-title {
            font-size: 28px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--blue), #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .login-input {
            width: 100%; padding: 14px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 16px;
            margin: 16px 0;
        }
        .login-btn {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, var(--blue), #8b5cf6);
            color: white; border: none;
            border-radius: 8px;
            font-size: 16px; font-weight: 600;
            cursor: pointer;
        }
        .container { display: none; }
        .container.logged-in { display: block; }
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 24px;
            background: linear-gradient(135deg, var(--blue), #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .main-content { padding: 24px; max-width: 1200px; margin: 0 auto; }
        .section {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .section-title { 
            font-size: 18px; 
            font-weight: 600; 
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .form-group { margin-bottom: 16px; }
        .form-label {
            display: block;
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        .form-input {
            width: 100%; padding: 12px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
        }
        .form-input:focus { outline: none; border-color: var(--blue); }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--blue), #8b5cf6);
            color: white;
        }
        .btn-success { background: var(--green); color: white; }
        .btn-danger { background: var(--red); color: white; }
        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }
        .btn-small { padding: 6px 12px; font-size: 12px; }
        .url-list { display: flex; flex-direction: column; gap: 12px; }
        .url-item {
            display: grid;
            grid-template-columns: 1fr 1fr 2fr auto auto;
            gap: 12px;
            align-items: center;
            padding: 16px;
            background: var(--bg-card);
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        .url-item:hover { border-color: var(--blue); }
        .url-info { display: flex; flex-direction: column; gap: 4px; }
        .url-label { font-size: 12px; color: var(--text-secondary); }
        .url-value { font-size: 14px; font-weight: 500; }
        .url-url {
            font-size: 13px;
            color: var(--text-secondary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .url-actions { display: flex; gap: 8px; }
        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .filter-bar .form-input { width: auto; min-width: 200px; }
        .add-form {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .switch-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .switch-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 30px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .switch-btn.a { background: linear-gradient(135deg, #3b82f6, #06b6d4); color: white; }
        .switch-btn.b { background: linear-gradient(135deg, #8b5cf6, #ec4899); color: white; }
        .switch-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
        .toast {
            position: fixed; top: 24px; right: 24px;
            padding: 16px 24px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: none; z-index: 1000;
        }
        .toast.show { display: block; }
        .empty-state { text-align: center; padding: 40px; color: var(--text-secondary); }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }
        .badge-green { background: rgba(16, 185, 129, 0.2); color: var(--green); }
    </style>
</head>
<body>
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <h1 class="login-title">⚡ FitTrack Pro</h1>
            <p style="color: var(--text-secondary); margin-bottom: 24px;">控制中心</p>
            <input type="password" class="login-input" id="passwordInput" placeholder="输入管理员密码">
            <button class="login-btn" onclick="login()">登录</button>
        </div>
    </div>
    
    <div class="container" id="mainContainer">
        <div class="header">
            <h1>⚡ FitTrack Pro 控制中心</h1>
        </div>
        
        <div class="main-content">
            
            <!-- 一键切换 -->
            <div class="section">
                <div class="section-title">🔴 一键切换 A/B 面</div>
                <div class="switch-grid">
                    <button class="switch-btn a" onclick="forceAll('fitness')">
                        <span style="font-size: 32px;">🏃</span>
                        <span style="font-size: 18px; font-weight: 600;">切换到 A 面</span>
                        <span style="font-size: 12px; opacity: 0.8;">健身界面</span>
                    </button>
                    <button class="switch-btn b" onclick="forceAll('custom')">
                        <span style="font-size: 32px;">🌐</span>
                        <span style="font-size: 18px; font-weight: 600;">切换到 B 面</span>
                        <span style="font-size: 12px; opacity: 0.8;">自定义页面</span>
                    </button>
                </div>
            </div>
            
            <!-- B面链接管理 -->
            <div class="section">
                <div class="section-title">
                    <span>🔗 B面链接配置（按包名+版本号）</span>
                    <button class="btn btn-success btn-small" onclick="showAddForm()">+ 添加</button>
                </div>
                
                <!-- 添加表单 -->
                <div class="add-form" id="addForm" style="display: none;">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">包名 *</label>
                            <input type="text" class="form-input" id="newPackageName" placeholder="com.example.app">
                        </div>
                        <div class="form-group">
                            <label class="form-label">版本号 *</label>
                            <input type="text" class="form-input" id="newVersion" placeholder="1.0.0">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">B面链接 URL *</label>
                        <input type="text" class="form-input" id="newUrl" placeholder="https://example.com">
                    </div>
                    <div class="form-group">
                        <label class="form-label">备注</label>
                        <input type="text" class="form-input" id="newNote" placeholder="可选">
                    </div>
                    <div style="display: flex; gap: 12px;">
                        <button class="btn btn-success" onclick="addUrl()">保存</button>
                        <button class="btn btn-secondary" onclick="hideAddForm()">取消</button>
                    </div>
                </div>
                
                <!-- 编辑表单 -->
                <div class="add-form" id="editForm" style="display: none;">
                    <input type="hidden" id="editId">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">包名</label>
                            <input type="text" class="form-input" id="editPackageName" readonly style="opacity: 0.6;">
                        </div>
                        <div class="form-group">
                            <label class="form-label">版本号</label>
                            <input type="text" class="form-input" id="editVersion" readonly style="opacity: 0.6;">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">B面链接 URL *</label>
                        <input type="text" class="form-input" id="editUrl">
                    </div>
                    <div class="form-group">
                        <label class="form-label">备注</label>
                        <input type="text" class="form-input" id="editNote">
                    </div>
                    <div style="display: flex; gap: 12px;">
                        <button class="btn btn-primary" onclick="updateUrl()">更新</button>
                        <button class="btn btn-secondary" onclick="hideEditForm()">取消</button>
                    </div>
                </div>
                
                <!-- 筛选 -->
                <div class="filter-bar">
                    <input type="text" class="form-input" id="filterPackage" placeholder="筛选包名..." oninput="renderUrlList()">
                    <input type="text" class="form-input" id="filterVersion" placeholder="筛选版本..." oninput="renderUrlList()">
                    <button class="btn btn-secondary btn-small" onclick="clearFilters()">清除</button>
                </div>
                
                <!-- URL列表 -->
                <div class="url-list" id="urlList">
                    <div class="empty-state">暂无配置</div>
                </div>
            </div>
            
        </div>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script>
        const DB_KEY = 'fittrack_db_v2';
        
        function getDB() {
            const data = localStorage.getItem(DB_KEY);
            if (data) {
                const db = JSON.parse(data);
                if (!db.urls) db.urls = [];
                return db;
            }
            return { urls: [], devices: {} };
        }
        
        function saveDB(db) {
            localStorage.setItem(DB_KEY, JSON.stringify(db));
        }
        
        function login() {
            const pwd = document.getElementById('passwordInput').value;
            if (pwd === 'admin123456' || pwd === 'admin') {
                localStorage.setItem('ft_admin_logged_in', 'true');
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainContainer').classList.add('logged-in');
                renderUrlList();
            } else {
                alert('密码错误');
            }
        }
        
        if (localStorage.getItem('ft_admin_logged_in') === 'true') {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainContainer').classList.add('logged-in');
        }
        
        function showAddForm() {
            document.getElementById('addForm').style.display = 'block';
            document.getElementById('editForm').style.display = 'none';
        }
        
        function hideAddForm() {
            document.getElementById('addForm').style.display = 'none';
        }
        
        function showEditForm(id) {
            const db = getDB();
            const item = db.urls.find(u => u.id === id);
            if (!item) return;
            
            document.getElementById('editId').value = id;
            document.getElementById('editPackageName').value = item.packageName;
            document.getElementById('editVersion').value = item.version;
            document.getElementById('editUrl').value = item.url;
            document.getElementById('editNote').value = item.note || '';
            
            document.getElementById('editForm').style.display = 'block';
            document.getElementById('addForm').style.display = 'none';
        }
        
        function hideEditForm() {
            document.getElementById('editForm').style.display = 'none';
        }
        
        function addUrl() {
            const packageName = document.getElementById('newPackageName').value.trim();
            const version = document.getElementById('newVersion').value.trim() || '*';
            const url = document.getElementById('newUrl').value.trim();
            const note = document.getElementById('newNote').value.trim();
            
            if (!packageName || !url) {
                showToast('包名和URL不能为空');
                return;
            }
            
            const db = getDB();
            db.urls.push({
                id: Date.now().toString(),
                packageName, version, url, note,
                createdAt: new Date().toISOString()
            });
            
            saveDB(db);
            hideAddForm();
            renderUrlList();
            showToast('添加成功');
        }
        
        function updateUrl() {
            const id = document.getElementById('editId').value;
            const url = document.getElementById('editUrl').value.trim();
            const note = document.getElementById('editNote').value.trim();
            
            if (!url) {
                showToast('URL不能为空');
                return;
            }
            
            const db = getDB();
            const item = db.urls.find(u => u.id === id);
            if (item) {
                item.url = url;
                item.note = note;
                item.updatedAt = new Date().toISOString();
                saveDB(db);
                hideEditForm();
                renderUrlList();
                showToast('更新成功');
            }
        }
        
        function deleteUrl(id) {
            if (!confirm('确定删除？')) return;
            
            const db = getDB();
            db.urls = db.urls.filter(u => u.id !== id);
            saveDB(db);
            renderUrlList();
            showToast('删除成功');
        }
        
        function clearFilters() {
            document.getElementById('filterPackage').value = '';
            document.getElementById('filterVersion').value = '';
            renderUrlList();
        }
        
        function renderUrlList() {
            const db = getDB();
            const filterPkg = document.getElementById('filterPackage').value.toLowerCase();
            const filterVer = document.getElementById('filterVersion').value.toLowerCase();
            
            let urls = db.urls;
            if (filterPkg) urls = urls.filter(u => u.packageName.toLowerCase().includes(filterPkg));
            if (filterVer) urls = urls.filter(u => u.version.toLowerCase().includes(filterVer));
            
            const container = document.getElementById('urlList');
            if (urls.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无配置</div>';
                return;
            }
            
            container.innerHTML = urls.map(item => `
                <div class="url-item">
                    <div class="url-info">
                        <span class="url-label">包名</span>
                        <span class="url-value">${escape(item.packageName)}</span>
                    </div>
                    <div class="url-info">
                        <span class="url-label">版本</span>
                        <span class="url-value">${item.version === '*' ? '<span class="badge badge-green">全部</span>' : escape(item.version)}</span>
                    </div>
                    <div class="url-url" title="${escape(item.url)}">${escape(item.url)}</div>
                    <div class="url-info">${item.note ? `<span class="url-label">${escape(item.note)}</span>` : ''}</div>
                    <div class="url-actions">
                        <button class="btn btn-primary btn-small" onclick="showEditForm('${item.id}')">编辑</button>
                        <button class="btn btn-danger btn-small" onclick="deleteUrl('${item.id}')">删除</button>
                    </div>
                </div>
            `).join('');
        }
        
        function escape(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function forceAll(mode) {
            const db = getDB();
            Object.keys(db.devices).forEach(id => {
                db.devices[id].mode = mode;
            });
            saveDB(db);
            showToast(`已切换到${mode === 'fitness' ? 'A' : 'B'}面`);
        }
        
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        if (localStorage.getItem('ft_admin_logged_in') === 'true') {
            renderUrlList();
        }
    </script>
</body>
</html>
